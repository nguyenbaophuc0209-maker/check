<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Tớ có vài điều muốn nói với mọi người</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(45deg, pink, purple);
      font-family: Arial;
      overflow: hidden;
    }

    .box {
      text-align: center;
      color: white;
      animation: fadeIn 2s ease;
    }

    h1 {
      font-size: 40px;
      animation: float 2s infinite alternate;
    }

    button {
      padding: 12px 25px;
      font-size: 18px;
      margin: 10px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    #yes {
      background: #00ffcc;
    }

    #no {
      background: #ff4d4d;
      position: absolute;
    }

    @keyframes fadeIn {
      from {opacity: 0;}
      to {opacity: 1;}
    }

    @keyframes float {
      from {transform: translateY(0);}
      to {transform: translateY(-10px);}
    }
  </style>
</head>

<body>

<div class="box">
  <h1>Đó chính là</h1>
  <button id="yes" onclick="yesClick()">Đồng ý nghe</button>
  <button id="no">Từ chối nghe</button>

  <p id="result" style="margin-top:20px;font-size:24px;"></p>
</div>

<script>
  const noBtn = document.getElementById("no");

  // Né chuột
  noBtn.addEventListener("mouseover", () => {
    const x = Math.random() * (window.innerWidth - 100);
    const y = Math.random() * (window.innerHeight - 50);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
  });

  function yesClick() {
    document.getElementById("result").innerHTML = "Không có gì cả hehehe";
  }
</script>

</body>
</html>
