<!DOCTYPE html>
<html>
<head>
  <title>Tớ có vài điều muốn nói với mọi người</title>
</head>

<body style="display:flex;justify-content:center;align-items:center;height:100vh;background:black;color:white;font-size:30px;text-align:center;">

  <div>
    <p>Đó chính là...</p>
    <button onclick="showMessage()" style="padding:10px 20px;font-size:18px;">Bấm vào đây</button>
    <p id="msg" style="margin-top:20px;"></p>
  </div>

  <script>
    function showMessage() {
      document.getElementById("msg").innerHTML = "Không có gì đâu hihihi";
    }
  </script>

</body>
</html>
