<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Có điều muốn nói...</title>

<style>
body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial;
  background: linear-gradient(45deg, #ff9a9e, #fad0c4);
}

.container {
  text-align: center;
  color: white;
  animation: fadeIn 2s ease;
}

h1 {
  font-size: 40px;
  animation: float 2s infinite alternate;
}

button {
  padding: 12px 25px;
  font-size: 18px;
  margin: 10px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.3s;
}

#yes {
  background: #00ffcc;
}

#no {
  background: #ff4d4d;
  position: absolute;
}

@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}

@keyframes float {
  from {transform: translateY(0);}
  to {transform: translateY(-10px);}
}

.heart {
  position: fixed;
  bottom: -10px;
  font-size: 24px;
  animation: fly 4s linear forwards;
}

@keyframes fly {
  to {
    transform: translateY(-100vh);
    opacity: 0;
  }
}
</style>
</head>

<body>

<div class="container">
  <h1 id="text">Tớ có vài bí mật muốn kể cho mọi người, liệu mọi người có muốn nghe không ?</h1>
  <button id="yes">Có nghe</button>
  <button id="no">Hông nghe</button>
  <p id="result" style="font-size:24px;"></p>
</div>

<script>
const noBtn = document.getElementById("no");
const yesBtn = document.getElementById("yes");

document.addEventListener("mousemove", (e) => {
  const rect = noBtn.getBoundingClientRect();

  const distance = Math.hypot(
    e.clientX - (rect.left + rect.width/2),
    e.clientY - (rect.top + rect.height/2)
  );

  if (distance < 120) {
    const x = Math.random() * (window.innerWidth - 100);
    const y = Math.random() * (window.innerHeight - 50);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
  }
});

yesBtn.onclick = () => {
  document.getElementById("text").innerHTML = "HOng có gì đâu tớ đùa á";
  document.getElementById("result").innerHTML = "Đùa đấy tớ iuu mng nhiều lắm";
  setInterval(createHeart, 300);
};

function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "💖";

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (Math.random() * 20 + 20) + "px";

  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 4000);
}
</script>

</body>
</html>
