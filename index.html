<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đang tải...</title>

<style>
body {
  margin: 0;
  background: black;
  color: lime;
  font-family: monospace;
  overflow: hidden;
}


#loading {
  position: fixed;
  width: 100%;
  height: 100%;
  padding: 20px;
  font-size: 18px;
  animation: flicker 0.1s infinite;
}

@keyframes flicker {
  0% {opacity: 1;}
  50% {opacity: 0.3;}
  100% {opacity: 1;}
}


#prank {
  display: none;
  position: fixed;
  width: 100%;
  height: 100%;
  background: linear-gradient(45deg, pink, purple);
  color: white;
  justify-content: center;
  align-items: center;
  text-align: center;
  flex-direction: column;
}


#message {
  font-size: 35px;
  animation: bounce 1s infinite alternate;
}

@keyframes bounce {
  from {transform: scale(1);}
  to {transform: scale(1.1);}
}


@keyframes shake {
  0% {transform: translate(0);}
  25% {transform: translate(5px, -5px);}
  50% {transform: translate(-5px, 5px);}
  75% {transform: translate(5px, 5px);}
  100% {transform: translate(0);}
}
</style>
</head>

<body>


<div id="loading">
  <p>Đang tải dữ liệu...</p>
  <p>Đang kết nối server...</p>
  <p>Đang truy cập hệ thống...</p>
  <p style="color:red;">⚠️ Phát hiện lỗi hệ thống...</p>
</div>


<div id="prank">
  <h1 id="message"></h1>
</div>

<script>

setTimeout(() => {
  document.getElementById("loading").style.display = "none";
  document.getElementById("prank").style.display = "flex";

  document.body.style.animation = "shake 0.3s";

  typeText("Ú òa 🤡 bị lừa rồi nha!\nChúc cả nhà 1/4 vui vẻeee :3");
}, 30000);

function typeText(text) {
  let i = 0;
  const speed = 50;
  const msg = document.getElementById("message");

  function typing() {
    if (i < text.length) {
      msg.innerHTML += text.charAt(i) === "\n" ? "<br>" : text.charAt(i);
      i++;
      setTimeout(typing, speed);
    }
  }

  typing();
}
</script>

</body>
</html>
